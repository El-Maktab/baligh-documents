<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFDFC"/>
      <stop offset="1" stop-color="#EDF7F4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#183725" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#396A50"/>
    </marker>
    <marker id="arrowAqua" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#397785"/>
    </marker>
    <marker id="arrowSand" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#D67545"/>
    </marker>
    <style>
      .title { font: 700 44px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #171A18; }
      .subtitle { font: 500 20px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #596B62; }
      .section { font: 700 26px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #171A18; }
      .label { font: 650 22px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #171A18; }
      .body { font: 500 18px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #596B62; }
      .tiny { font: 600 15px "Alexandria Variable","Noto Sans Arabic",sans-serif; fill: #396A50; letter-spacing: 0.08em; }
      .card { filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>
  <circle cx="1280" cy="150" r="92" fill="#DCEFEB" fill-opacity="0.9"/>
  <circle cx="1380" cy="230" r="42" fill="#F3EDDD" fill-opacity="0.95"/>
  <circle cx="122" cy="122" r="18" fill="#F3A4CA" fill-opacity="0.65"/>

  <text x="120" y="118" class="title">GED in the Baligh Runtime</text>
  <text x="120" y="156" class="subtitle">From raw Arabic text to fused error spans, aligned with Baligh’s green-first design language.</text>

  <rect x="120" y="220" width="236" height="150" rx="30" fill="#F3EDDD" stroke="#D67545" stroke-width="3" class="card"/>
  <text x="152" y="275" class="tiny">INPUT</text>
  <text x="152" y="314" class="label">المستخدم</text>
  <text x="152" y="346" class="body">Raw Arabic text</text>

  <rect x="420" y="206" width="430" height="530" rx="38" fill="#FFFFFF" stroke="#D4E4DD" stroke-width="3" class="card"/>
  <text x="454" y="258" class="section">Preprocessing</text>
  <text x="454" y="290" class="body">Normalization, boundary split, segmentation, and morphology.</text>

  <rect x="454" y="332" width="158" height="116" rx="24" fill="#DCEFEB" stroke="#397785" stroke-width="3"/>
  <text x="486" y="388" class="label">Normalize</text>

  <rect x="646" y="332" width="170" height="116" rx="24" fill="#DCEFEB" stroke="#397785" stroke-width="3"/>
  <text x="673" y="378" class="label">Word boundary</text>
  <text x="684" y="408" class="body">split</text>

  <rect x="454" y="498" width="158" height="116" rx="24" fill="#DCEFEB" stroke="#397785" stroke-width="3"/>
  <text x="489" y="554" class="label">Segment</text>
  <text x="496" y="584" class="body">tokens</text>

  <rect x="646" y="498" width="170" height="116" rx="24" fill="#DCEFEB" stroke="#397785" stroke-width="3"/>
  <text x="683" y="553" class="label">Morph</text>
  <text x="668" y="583" class="body">analysis</text>

  <rect x="420" y="770" width="430" height="96" rx="24" fill="#FFFFFF" stroke="#D4E4DD" stroke-width="2"/>
  <text x="454" y="810" class="label">GEDInput</text>
  <text x="454" y="840" class="body">text, normalized_text, tokens, morph_features</text>

  <rect x="920" y="206" width="440" height="530" rx="38" fill="#FFFFFF" stroke="#D4E4DD" stroke-width="3" class="card"/>
  <text x="954" y="258" class="section">GED Service</text>
  <text x="954" y="290" class="body">Three detector lanes feed one fusion sweep.</text>

  <rect x="954" y="332" width="170" height="116" rx="24" fill="#DFF4E8" stroke="#519872" stroke-width="3"/>
  <text x="972" y="388" class="label">GEDService</text>
  <text x="979" y="418" class="body">process()</text>

  <rect x="1160" y="332" width="166" height="104" rx="24" fill="#DFF4E8" stroke="#519872" stroke-width="3"/>
  <text x="1182" y="390" class="label">RuleBased</text>
  <text x="1200" y="420" class="body">Detector</text>

  <rect x="954" y="484" width="170" height="104" rx="24" fill="#DFF4E8" stroke="#519872" stroke-width="3"/>
  <text x="980" y="542" class="label">Lexicon</text>
  <text x="990" y="572" class="body">Detector</text>

  <rect x="1160" y="484" width="166" height="104" rx="24" fill="#DFF4E8" stroke="#519872" stroke-width="3"/>
  <text x="1204" y="542" class="label">ML</text>
  <text x="1189" y="572" class="body">Detector</text>

  <rect x="1044" y="630" width="194" height="106" rx="28" fill="#F6D6E4" stroke="#A13D63" stroke-width="3"/>
  <text x="1071" y="688" class="label">resolve_overlaps()</text>

  <rect x="920" y="770" width="440" height="96" rx="24" fill="#FFFFFF" stroke="#D4E4DD" stroke-width="2"/>
  <text x="954" y="810" class="label">GEDOutput.errors</text>
  <text x="954" y="840" class="body">Merged spans with category, confidence, source, and tier.</text>

  <rect x="1390" y="300" width="130" height="122" rx="24" fill="#F3EDDD" stroke="#D67545" stroke-width="3" class="card"/>
  <text x="1413" y="352" class="label">UI</text>
  <text x="1410" y="384" class="body">highlighting</text>

  <rect x="1390" y="500" width="130" height="122" rx="24" fill="#F3EDDD" stroke="#D67545" stroke-width="3" class="card"/>
  <text x="1410" y="552" class="label">GEC</text>
  <text x="1406" y="584" class="body">ranking</text>

  <path d="M356 295H396" stroke="#D67545" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSand)"/>
  <path d="M534 448V480" stroke="#397785" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowAqua)"/>
  <path d="M732 448V480" stroke="#397785" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowAqua)"/>
  <path d="M612 556H646" stroke="#397785" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowAqua)"/>
  <path d="M732 616V750" stroke="#397785" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowAqua)"/>
  <path d="M850 818H896" stroke="#396A50" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1124 388H1148" stroke="#396A50" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1039 448V472" stroke="#396A50" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1243 436V472" stroke="#396A50" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1243 588V618H1141V618" stroke="#396A50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)"/>
  <path d="M1039 588V618H1120" stroke="#396A50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)"/>
  <path d="M1243 388V618H1238" stroke="#396A50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowGreen)"/>
  <path d="M1141 736V750" stroke="#A13D63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M1360 810H1380" stroke="#396A50" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowSand)"/>
  <path d="M1360 824C1414 824 1432 824 1455 620" stroke="#396A50" stroke-width="4" stroke-linecap="round" fill="none" marker-end="url(#arrowSand)"/>
</svg>
